<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DFA Minimization Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.21.1/cytoscape.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="header-title">DFA Minimization Visualizer</h1>

    <div class="card">
        <h3>Step 1: Define DFA Structure</h3>
        <div class="input-row">
            <input type="text" id="states" placeholder="States (e.g., q0,q1,q2,q3)" value="q0,q1,q2,q3">
            <input type="text" id="alphabet" placeholder="Alphabet (e.g., 0,1)" value="0,1">
            <button class="btn-gen" onclick="initTable()">Create Transition Table</button>
        </div>
    </div>

    <div class="card" id="trans-card" style="display:none;">
        <h3>Step 2: Original Transition Rules</h3>
        <div id="table-area"></div>
        <div class="input-row" style="margin-top:20px;">
            <input type="text" id="start" placeholder="Start State (q0)" value="q0">
            <input type="text" id="finals" placeholder="Final States (q2)" value="q2">
        </div>
        <button class="btn-min" onclick="processMinimization()">Minimize & Generate New Table</button>
    </div>

    <div class="viz-grid">
        <div><h3>Original DFA</h3><div id="cy-orig" class="cy-box"></div></div>
        <div><h3>New Transition Table (Myhill)</h3><div id="log" class="log-box">Waiting for input...</div></div>
        <div><h3>Minimized DFA</h3><div id="cy-min" class="cy-box"></div></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
